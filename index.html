<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>GymTrackify</title>

<style>
body {
  margin: 0;
  background: #000;
  color: white;
  font-family: Arial;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
}

.logo {
  font-size: 40px;
  font-weight: bold;
  letter-spacing: 3px;
  animation: fadeUp 1.5s ease;
}

.sub {
  margin-top: 10px;
  color: #888;
  animation: fadeUp 2s ease;
}

/* animação */
@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>
</head>

<body>

<div>
  <div class="logo">GYMTRACKIFY</div>
  <div class="sub">em breve</div>
</div>

</body>
</html>
