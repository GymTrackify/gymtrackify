<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>GymTrackify</title>

<style>
body {
  margin: 0;
  background: #000;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

/* imagem */
img {
  width: 100%;
  height: 100vh;
  object-fit: cover;
}

/* overlay */
.overlay {
  position: absolute;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  width: 60%;
}

/* barra de progresso */
.progress-bar {
  width: 100%;
  height: 4px;
  background: rgba(255,255,255,0.2);
  border-radius: 10px;
  overflow: hidden;
}

.progress {
  width: 0%;
  height: 100%;
  background: white;
  animation: load 5s linear forwards;
}

@keyframes load {
  from { width: 0%; }
  to { width: 100%; }
}

/* texto opcional */
.text {
  color: #aaa;
  font-size: 12px;
  margin-top: 8px;
  text-align: center;
  letter-spacing: 1px;
}

/* fade */
.fade-out {
  animation: fadeOut 1s ease forwards;
}

@keyframes fadeOut {
  to { opacity: 0; }
}
</style>
</head>

<body>

<img id="splash" src="imagens/1.png" alt="Loading">

<div class="overlay">
  <div class="progress-bar">
    <div class="progress"></div>
  </div>
  <div class="text">carregando...</div>
</div>

<script>
const splash = document.getElementById("splash");

// tempo total (5s)
setTimeout(() => {
  splash.classList.add("fade-out");

  setTimeout(() => {
    window.location.replace("https://gymtrackify.netlify.app/");
  }, 1000);

}, 5000);
</script>

</body>
</html>
