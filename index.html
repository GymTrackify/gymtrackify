<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>GymTrackify - Manutenção</title>
<link rel="icon" type="https://avatars.githubusercontent.com/u/271838800?s=200&v=4" href="favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', Arial, sans-serif;
  background: radial-gradient(circle at top, #0f0f0f, #000);
  color: white;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* centralização */
main {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
}

/* container */
.container {
  max-width: 400px;
}

/* logo */
.logo {
  font-size: 36px;
  font-weight: 600;
  letter-spacing: 3px;
  margin-bottom: 20px;
  text-transform: uppercase;

  background: linear-gradient(90deg, #888, #ffffff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

  animation: fadeUp 1.2s ease;
}

/* título */
h1 {
  font-size: 24px;
  margin-bottom: 10px;
  animation: fadeUp 1.5s ease;
}

/* texto */
p {
  color: #aaa;
  margin-bottom: 25px;
  animation: fadeUp 1.8s ease;
}

/* loader */
.loader {
  width: 45px;
  height: 45px;
  border: 4px solid #222;
  border-top: 4px solid #ffffff;
  border-radius: 50%;
  margin: 20px auto;
  animation: spin 1s linear infinite;
}

/* footer */
footer {
  text-align: center;
  padding: 15px;
  font-size: 12px;
  color: #666;
  border-top: 1px solid #222;
}

/* link */
footer a {
  color: #aaa;
  text-decoration: none;
  transition: 0.3s;
}

footer a:hover {
  color: #ffffff;
}

/* animações */
@keyframes spin {
  to { transform: rotate(360deg); }
}

@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>
</head>

<body>

<main>
  <div class="container">

    <div class="logo">GymTrackify</div>

    <h1>🚧 Em manutenção</h1>

    <p>
      Estamos evoluindo a plataforma para entregar uma experiência ainda melhor.
      Em breve, novidades estarão disponíveis.
    </p>

    <div class="loader"></div>

  </div>
</main>

<footer>
  © 2026 GymTrackify • 
  <a href="https://github.com/GymTrackify" target="_blank">
    GitHub
  </a>
</footer>

</body>
</html>
